<div class="app-wrapper">
    <app-header></app-header>
  
    <main class="main-content">
      <div class="page">
        <div class="pdp-texte-intro">
          <img src="assets/media/tete.jpg" class="pdp" />
  
          <span class="text-intro">Bienvenue dans mon portfolio!</span>
  
          <div class="widget">
            <div class="scroll-container-wrapper">
              <button class="nav left" (click)="scrollLeft()">❮</button>
  
              <div class="scroll-container" #scrollWidget
                (mouseenter)="pauseAutoScroll()"
                (mouseleave)="resumeAutoScroll()">
                <div class="page" *ngFor="let page of pages">
                  <h2><a [routerLink]="page.link">{{ page.titre }}</a></h2>
                  <p *ngFor="let line of page.lines">{{ line }}</p>
                </div>
              </div>
  
              <button class="nav right" (click)="scrollRight()">❯</button>
            </div>
          </div>
          <div *ngFor="let project of projects" class="project-card">
  <h3>{{ project.title }}</h3>
  <p>{{ project.description }}</p>
  <img [src]="project.image" alt="{{ project.title }}" width="200">
</div>
        </div>
      </div>
  
      <router-outlet></router-outlet>
    </main>
  
    <app-footer></app-footer>
  </div>
