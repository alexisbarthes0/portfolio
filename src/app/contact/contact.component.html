<div class="app-wrapper">
  <app-header></app-header>

  <main class="main-content">
    <div class="contact-container">
      <h2>Contactez-moi!</h2>

      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="name">Nom</label>
          <input
            id="name"
            type="text"
            formControlName="name"
            placeholder="Votre nom"
            [ngClass]="{ 'is-invalid': submitted && f['name'].errors }"
          />
          <div *ngIf="submitted && f['name'].errors" class="invalid-feedback">
            <small *ngIf="f['name'].errors['required']">Le nom est requis.</small>
            <small *ngIf="f['name'].errors['minlength']">Minimum 2 caractères.</small>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="Votre email"
            [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
          />
          <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
            <small *ngIf="f['email'].errors['required']">L'email est requis.</small>
            <small *ngIf="f['email'].errors['email']">Format invalide.</small>
          </div>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea
            id="message"
            formControlName="message"
            rows="5"
            placeholder="Votre message"
            [ngClass]="{ 'is-invalid': submitted && f['message'].errors }"
          ></textarea>
          <div *ngIf="submitted && f['message'].errors" class="invalid-feedback">
            <small *ngIf="f['message'].errors['required']">Le message est requis.</small>
            <small *ngIf="f['message'].errors['minlength']">Minimum 10 caractères.</small>
          </div>
        </div>

        <button type="submit" class="btn-submit">Envoyer</button>
      </form>
    </div>
  </main>

  <app-footer></app-footer>
</div>
